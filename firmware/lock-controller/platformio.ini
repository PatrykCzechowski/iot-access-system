; ── PlatformIO configuration — AccessControl Lock Controller ──────────────────
; Target: Arduino Nano ESP32 (ESP32-S3)
; Build: includes shared/ sources alongside the sketch files

[platformio]
src_dir = .

[env:arduino_nano_esp32]
platform  = espressif32
board     = arduino_nano_esp32
framework = arduino

; Compile sketch files + shared/*.cpp (path relative to src_dir)
build_src_filter = +<*.ino> +<*.cpp> +<../shared/*.cpp>

monitor_speed = 115200

lib_deps =
    knolleary/PubSubClient
    tzapu/WiFiManager
    bblanchon/ArduinoJson
