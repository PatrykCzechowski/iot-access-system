[env:nano_esp32]
platform  = espressif32
board     = arduino_nano_esp32
framework = arduino
monitor_speed = 115200
upload_port = COM9
monitor_port = COM9
upload_protocol = dfu

lib_deps =
    adafruit/Adafruit PN532@^1.3.4
    knolleary/PubSubClient@^2.8
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.4.1
